<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="assets/images/favicon.svg" type="image/svg+xml">
    <title>Page Not Found | Wye Cabins</title>
    <meta name="robots" content="noindex">
    <link rel="stylesheet" href="styles.css">
    <style>
      .error-page {
        min-height: 80vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 40px 20px;
      }
      .error-code {
        font-family: var(--heading-font);
        font-size: 120px;
        line-height: 1;
        color: var(--accent);
        margin-bottom: 8px;
      }
      .error-title {
        font-family: var(--heading-font);
        font-size: 32px;
        margin-bottom: 16px;
      }
      .error-text {
        color: var(--ink-muted);
        max-width: 440px;
        margin-bottom: 32px;
        line-height: 1.6;
      }
      .error-links {
        display: flex;
        gap: 16px;
        flex-wrap: wrap;
        justify-content: center;
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#main-content">Skip to content</a>
    <header class="topbar" id="site-header"></header>

    <main id="main-content">
      <div class="error-page">
        <div class="error-code">404</div>
        <h1 class="error-title">Page not found</h1>
        <p class="error-text">The page you're looking for doesn't exist or has been moved. You might find what you're looking for below.</p>
        <div class="error-links">
          <a class="outline-btn" href="index.html">Home</a>
          <a class="outline-btn" href="country.html">Our Cabins</a>
          <a class="outline-btn" href="blog.html">Blog</a>
        </div>
      </div>
    </main>

    <footer class="site-footer" id="site-footer"></footer>
    <script src="script.js" defer></script>
  </body>
</html>
